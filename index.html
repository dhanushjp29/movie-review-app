    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO (basic but good for marks) -->
    <meta name="description" content="Movie Review App - Search, explore and rate movies" />
    <meta name="keywords" content="movies, reviews, ratings, react app" />
    <meta name="author" content="Your Name" />

    <!-- Title -->
    <title>Movie Review App</title>

    <!-- Favicon (main) -->
    <link rel="icon" href="/favicon.ico" />

    <!-- Optional icons (good practice, but not mandatory) -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

    <!-- Apple (optional) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Theme color (nice touch) -->

    <script type="module" src="/src/main.jsx"></script>
